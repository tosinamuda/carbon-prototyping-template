<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docs · IBM Carbon Web Components</title>
    <link rel="icon" href="data:," />

    <!-- IBM Plex (Carbon's typeface), from CDN -->
    <link rel="stylesheet" href="https://1.www.s81c.com/common/carbon/plex/sans.css" />
    <link rel="stylesheet" href="https://1.www.s81c.com/common/carbon/plex/mono.css" />

    <!-- Carbon Web Components: just the UI-shell header for this reading page -->
    <script type="module"
      src="https://1.www.s81c.com/common/carbon/web-components/version/v2.56.0/ui-shell.min.js"></script>
    <script type="module"
      src="https://1.www.s81c.com/common/carbon/web-components/version/v2.56.0/tag.min.js"></script>

    <style>
      :root { font-size: 100%; } /* 16px base → 1rem */
      html, body { height: 100%; }
      body {
        margin: 0;
        overflow: hidden; /* app-shell: only #main scrolls, header stays put */
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        background: #f4f4f4; /* gray-10 */
        color: #161616; /* gray-100 */
      }

      /* Dark g100 header, matching the rest of the app. */
      cds-header {
        --cds-background: #161616;
        --cds-text-primary: #f4f4f4;
        --cds-text-secondary: #c6c6c6;
        --cds-icon-primary: #f4f4f4;
        --cds-border-subtle: #393939;
        --cds-background-hover: #2c2c2c;
        --cds-layer-hover: #2c2c2c;
      }

      /* Content region: sits below the fixed 3rem header and scrolls on its own. */
      #main {
        margin-top: 3rem;
        height: calc(100vh - 3rem);
        overflow-y: auto;
        padding: 2rem 1.5rem 4rem;
      }

      .doc {
        max-width: 50rem; /* comfortable reading measure */
        margin: 0 auto;
      }

      .doc-toolbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .doc-toolbar .spacer { flex: 1; }
      .raw-link {
        font-size: 0.875rem;
        color: #6f6f6f; /* gray-60 */
      }
      .raw-link:hover { color: #0f62fe; }

      /* ── Markdown prose, Carbon-flavoured ──────────────────────────────────── */
      .prose h1 { font-size: 2rem; font-weight: 400; line-height: 1.25; margin: 0 0 1rem; }
      .prose h2 { font-size: 1.5rem; font-weight: 400; line-height: 1.3; margin: 2.5rem 0 1rem; }
      .prose h3 { font-size: 1.25rem; font-weight: 400; line-height: 1.4; margin: 2rem 0 0.75rem; }
      .prose p { font-size: 1rem; line-height: 1.5; margin: 0 0 1rem; }
      .prose ul, .prose ol { padding-left: 1.5rem; margin: 0 0 1rem; }
      .prose li { font-size: 1rem; line-height: 1.5; margin: 0.25rem 0; }
      .prose a { color: #0f62fe; text-decoration: none; } /* blue-60 */
      .prose a:hover { color: #0043ce; text-decoration: underline; } /* blue-70 */
      .prose strong { font-weight: 600; }
      .prose hr { border: none; border-top: 0.0625rem solid #e0e0e0; margin: 2.5rem 0; }

      .prose code {
        font-family: 'IBM Plex Mono', ui-monospace, monospace;
        font-size: 0.875rem;
        background: #e0e0e0; /* gray-20 */
        padding: 0.0625rem 0.25rem;
      }
      .prose pre {
        background: #161616; /* gray-100 */
        color: #f4f4f4;
        padding: 1rem;
        overflow-x: auto;
        margin: 0 0 1.5rem;
      }
      .prose pre code { background: none; color: inherit; padding: 0; font-size: 0.8125rem; }

      .prose blockquote {
        margin: 1.5rem 0;
        padding: 0.75rem 1rem;
        border-left: 0.25rem solid #0f62fe; /* blue-60 accent */
        background: #edf5ff; /* blue-10 */
        color: #393939; /* gray-80 */
      }
      .prose blockquote p:last-child { margin-bottom: 0; }

      .prose table {
        border-collapse: collapse;
        width: 100%;
        margin: 1.5rem 0;
        font-size: 0.875rem;
      }
      .prose th, .prose td {
        border-bottom: 0.0625rem solid #e0e0e0; /* gray-20 hairline */
        padding: 0.5rem 1rem;
        text-align: left;
        vertical-align: top;
      }
      .prose th { background: #e0e0e0; font-weight: 600; } /* gray-20 header, Carbon-style */
      .prose tbody tr:hover { background: #f4f4f4; }

      /* GFM task-list checkboxes (the "- [ ]" items in the plan). */
      .prose li.task-list-item { list-style: none; margin-left: -1.5rem; }
      .prose input[type="checkbox"] { margin-right: 0.5rem; }

      .doc-error { color: #da1e28; } /* red-60 */
    </style>
  </head>
  <body>
    <cds-header aria-label="IBM Carbon docs">
      <cds-header-name href="index.html" prefix="IBM Carbon">Docs</cds-header-name>
    </cds-header>

    <main id="main">
      <article class="doc">
        <div class="doc-toolbar">
          <a class="prose" href="index.html#tutorial" style="color:#0f62fe;">← Back to the app</a>
          <span class="spacer"></span>
          <a class="raw-link" id="raw-link" href="#" target="_blank" rel="noopener">View raw .md</a>
        </div>
        <div class="prose" id="content">Loading…</div>
      </article>
    </main>

    <script type="module">
      import { marked } from 'https://esm.sh/marked@14';

      // Only these docs may be rendered — keeps the viewer from being pointed at arbitrary paths.
      const ALLOWED = [
        'marketing-dashboard-plan.md',
        'AGENTS.md',
        'carbon-reference.md',
        'README.md',
      ];

      const content = document.getElementById('content');
      const rawLink = document.getElementById('raw-link');

      const params = new URLSearchParams(location.search);
      const requested = (params.get('doc') || '').split('#')[0];

      function renderIndex() {
        document.title = 'Docs · IBM Carbon Web Components';
        const links = ALLOWED.map((f) => `<li><a href="doc.html?doc=${f}">${f}</a></li>`).join('');
        content.innerHTML = `<h1>Docs</h1><p>Pick a document:</p><ul>${links}</ul>`;
        rawLink.style.display = 'none';
      }

      async function renderDoc(file) {
        rawLink.href = file;
        marked.setOptions({ gfm: true });
        try {
          const res = await fetch(file);
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          const md = await res.text();
          content.innerHTML = marked.parse(md);
          // Keep cross-document .md links inside this viewer instead of downloading raw files.
          content.querySelectorAll('a[href]').forEach((a) => {
            const m = a.getAttribute('href').match(/^([^/?#]+\.md)(#.*)?$/);
            if (m) a.setAttribute('href', `doc.html?doc=${m[1]}${m[2] || ''}`);
          });
          // Title from the first heading, for a sensible tab name.
          const h1 = content.querySelector('h1');
          document.title = (h1 ? h1.textContent : file) + ' · Docs';
        } catch (err) {
          content.innerHTML =
            `<h1 class="doc-error">Couldn’t load that document</h1>` +
            `<p>${file} — ${err.message}</p>`;
        }
      }

      if (!requested) renderIndex();
      else if (ALLOWED.includes(requested)) renderDoc(requested);
      else {
        content.innerHTML =
          `<h1 class="doc-error">Unknown document</h1>` +
          `<p>“${requested}” isn’t one of the project docs.</p>`;
        rawLink.style.display = 'none';
      }
    </script>
  </body>
</html>
